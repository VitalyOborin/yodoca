id: soul
name: Soul Companion Runtime
version: "0.1.0"

entrypoint: main:SoulExtension

description: |
  Behavioral runtime for the Soul companion subsystem. Owns internal state,
  phase/presence dynamics, initiative policy, relationship metrics, and
  observability for the living companion model.

depends_on:
  - kv
  - memory

config:
  tick_interval_seconds: 30
  persist_interval_seconds: 60
  context_token_budget: 200
  mood_classifier_daily_budget: 3
  mood_classifier_min_chars: 180
  mood_classifier_signal_threshold: 0.45
  mood_classifier_weight: 0.25

events:
  publishes:
    - topic: companion.phase.changed
      description: "Companion behavioral phase changed."
    - topic: companion.presence.updated
      description: "Companion visible presence changed."
    - topic: companion.outreach.attempted
      description: "Companion initiated proactive outreach."
    - topic: companion.outreach.result
      description: "Companion outreach was resolved."

enabled: true
