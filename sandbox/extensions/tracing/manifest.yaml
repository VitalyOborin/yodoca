id: tracing
name: Execution Tracing
version: "1.0.0"

entrypoint: main:TracingExtension

description: |
  Structured execution tracing for agent invocations. Records every
  tool call, LLM step, and context enrichment as nested spans in SQLite.
  Provides real-time EventBus notifications and self-inspection tools.

depends_on: []

config:
  retention_days: 30
  vacuum_after_cleanup: true
  max_input_summary_len: 2000
  max_output_summary_len: 2000
  warn_at_session_tokens: 200000
  stop_at_session_tokens: 400000
  pricing:
    gpt-4o:
      input: 2.5
      output: 10.0
    gpt-4o-mini:
      input: 0.15
      output: 0.6
    claude-3-5-sonnet:
      input: 3.0
      output: 15.0
  trace_context_enrichment: true
  trace_tool_calls: true
  trace_llm_calls: true

schedules:
  - name: trace_cleanup
    cron: "30 4 * * *"
    task: cleanup_old_traces
    description: "Delete traces older than retention_days"

events:
  publishes:
    - topic: tracing.span.update
      description: "A tracing span changed state (started/completed)"
    - topic: tracing.budget.warning
      description: "Session token budget warning threshold reached"
    - topic: tracing.budget.exceeded
      description: "Session token budget stop threshold reached"

enabled: true
