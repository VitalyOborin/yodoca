default_agent: orchestrator_agent
agents:
  default:
    instructions: sandbox/prompts/default.jinja2
    model: gpt-5-mini
    provider: openai
event_bus:
  batch_size: 3
  db_path: sandbox/data/event_journal.db
  max_retries: 3
  poll_interval: 5.0
extensions:
  embedding:
    default_model: text-embedding-3-large
    provider: openai
    #default_model: text-embedding-jina-embeddings-v5-text-small-retrieval
    #provider: lm_studio
logging:
  backup_count: 3
  file: sandbox/logs/app.log
  level: INFO
  # console_level: WARNING   # optional; defaults to level (independent from file)
  # console_style: text      # text | json
  # file_style: text         # text | json
  log_to_console: false
  max_bytes: 10485760
  # subsystems:
  #   ext.memory: DEBUG
  #   core.events.bus: INFO
  # console_subsystems: []    # if set, only these prefixes on console
providers:
  openai:
    api_key_secret: OPENAI_API_KEY
    type: openai_compatible
  lm_studio:
    api_key_secret: "dummy_key"
    type: openai_compatible
    base_url: http://127.0.0.1:1234/v1
    api_key_literal: lm-studio
    supports_hosted_tools: false
# Model catalog: cost and capability metadata for delegation routing.
# Overrides built-in defaults. cost_tier: free|low|medium|high; capability_tier: basic|standard|advanced|frontier
models:
  qwen/qwen3.5-9b:
    cost_tier: free
    capability_tier: basic
    strengths: [speed, privacy]
    context_window: 32768
  gpt-5-mini:
    cost_tier: low
    capability_tier: standard
    strengths: [speed, general, cost-effective]
    context_window: 400000
  gpt-5.4:
    cost_tier: high
    capability_tier: frontier
    strengths: [reasoning, general, tool-use]
    context_window: 1000000
  gpt-5.3:
    cost_tier: medium
    capability_tier: advanced
    strengths: [reasoning, general, tool-use]
    context_window: 128000
  gpt-5.3-codex:
    cost_tier: high
    capability_tier: frontier
    strengths: [code, reasoning, tool-use]
    context_window: 128000
thread:
  timeout_sec: 1800
supervisor:
  restart_file: sandbox/.restart_requested
  restart_file_check_interval: 5
