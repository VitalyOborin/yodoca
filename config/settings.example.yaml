agents:
  default:
    instructions: prompts/default.jinja2
    model: gpt-5-mini
    provider: openai
  orchestrator:
    instructions: prompts/orchestrator.jinja2
    model: qwen/qwen3.5-9b
    provider: lm_studio
event_bus:
  batch_size: 3
  db_path: sandbox/data/event_journal.db
  max_retries: 3
  poll_interval: 5.0
# Model catalog: cost and capability metadata for delegation routing.
# Overrides built-in defaults. cost_tier: free|low|medium|high; capability_tier: basic|standard|advanced|frontier
# models:
#   gpt-5-mini:
#     cost_tier: low
#     capability_tier: standard
#     strengths: [speed, general]
#     context_window: 128000
#   my-local-model:
#     cost_tier: free
#     capability_tier: basic
#     strengths: [speed, privacy]
extensions:
  embedding:
    default_model: text-embedding-3-large
    provider: openai
    #default_model: text-embedding-jina-embeddings-v5-text-small-retrieval
    #provider: lm_studio
logging:
  backup_count: 3
  file: sandbox/logs/app.log
  level: INFO
  log_to_console: false
  max_bytes: 10485760
providers:
  openai:
    api_key_secret: OPENAI_API_KEY
    type: openai_compatible
  lm_studio:
    api_key_secret: "dummy_key"
    type: openai_compatible
    base_url: http://127.0.0.1:1234/v1
    api_key_literal: lm-studio
    supports_hosted_tools: false
  # Optional: chat/completions-only OpenAI-compatible API (e.g. z.ai).
  # zai:
  #   type: openai_compatible
  #   base_url: https://api.z.ai/api/paas/v4
  #   api_key_secret: ZAI_API_KEY
  #   api_mode: chat_completions
  #   supports_hosted_tools: false
session:
  timeout_sec: 1800
supervisor:
  restart_file: sandbox/.restart_requested
  restart_file_check_interval: 5
