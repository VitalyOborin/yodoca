name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality (ruff + format + imports + mypy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv + Python 3.12
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format . --check

      - name: Import boundaries
        run: uv run lint-imports

      - name: MyPy
        run: uv run mypy core onboarding supervisor

  tests:
    name: Tests (pytest, temporary non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv + Python 3.12
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked --extra dev

      # Temporary non-blocking mode due known pre-existing failures.
      # Phase-out policy:
      # 1) Pytest is green on main for >=14 consecutive days.
      # 2) Pytest is green for >=10 consecutive merged PRs.
      # Then remove "continue-on-error: true" and make tests a required check.
      - name: Pytest
        run: uv run pytest
