openapi: 3.1.0
info:
  title: Yodoca Web Channel API
  version: 0.5.0
  description: >
    OpenAPI specification for the experimental web channel API with first-class
    thread and project resources.
servers:
  - url: http://127.0.0.1:8080
    description: Local default
tags:
  - name: openai-compatible
  - name: ag-ui
  - name: system
  - name: threads
  - name: projects
  - name: notifications
  - name: schedules
paths:
  /v1/models:
    get:
      tags: [openai-compatible]
      summary: List available models
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OpenAI-compatible model list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelsResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
  /v1/chat/completions:
    post:
      tags: [openai-compatible]
      summary: Create chat completion
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XThreadId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCompletionsRequest"
      responses:
        "200":
          description: Completion response (JSON or SSE stream)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatCompletionsResponse"
            text/event-stream:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "422":
          $ref: "#/components/responses/ValidationError"
        "503":
          $ref: "#/components/responses/BusyError"
        "504":
          $ref: "#/components/responses/TimeoutError"
  /v1/responses:
    post:
      tags: [openai-compatible]
      summary: Create response
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XThreadId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResponsesRequest"
      responses:
        "200":
          description: Responses API result (JSON or SSE stream)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponsesResponse"
            text/event-stream:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "422":
          $ref: "#/components/responses/ValidationError"
        "503":
          $ref: "#/components/responses/BusyError"
        "504":
          $ref: "#/components/responses/TimeoutError"
  /agent:
    post:
      tags: [ag-ui]
      summary: Run agent (AG-UI protocol)
      description: >
        AG-UI (Agent-User Interaction) protocol endpoint. Accepts RunAgentInput
        and streams AG-UI events over Server-Sent Events. See
        https://docs.ag-ui.com/introduction for protocol details.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XThreadId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgUIRunRequest"
      responses:
        "200":
          description: AG-UI event stream (SSE)
          content:
            text/event-stream:
              schema:
                type: string
                description: Server-Sent Events with AG-UI event types
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "422":
          $ref: "#/components/responses/ValidationError"
        "503":
          $ref: "#/components/responses/BusyError"
        "504":
          $ref: "#/components/responses/TimeoutError"
  /api/health:
    get:
      tags: [system]
      summary: Health check
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Service health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
  /api/threads:
    get:
      tags: [threads]
      summary: List threads
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Thread list
          content:
            application/json:
              schema:
                type: object
                properties:
                  threads:
                    type: array
                    items:
                      $ref: "#/components/schemas/Thread"
                required: [threads]
        "401":
          $ref: "#/components/responses/UnauthorizedError"
    post:
      tags: [threads]
      summary: Create thread
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateThreadRequest"
      responses:
        "200":
          description: Created thread
          content:
            application/json:
              schema:
                type: object
                properties:
                  thread:
                    $ref: "#/components/schemas/Thread"
                required: [thread]
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
  /api/threads/{thread_id}:
    get:
      tags: [threads]
      summary: Get thread metadata and history
      security:
        - bearerAuth: []
      parameters:
        - name: thread_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Thread metadata and history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThreadDetailResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    patch:
      tags: [threads]
      summary: Update thread metadata
      description: >
        `is_archived=true` hides the thread from default listings without
        deleting `agent_messages`. Restore with `is_archived=false`.
      security:
        - bearerAuth: []
      parameters:
        - name: thread_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateThreadRequest"
      responses:
        "200":
          description: Updated thread
          content:
            application/json:
              schema:
                type: object
                properties:
                  thread:
                    $ref: "#/components/schemas/Thread"
                required: [thread]
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    delete:
      tags: [threads]
      summary: Archive thread
      description: >
        Soft-archives the thread. History is preserved and can be restored with
        `PATCH /api/threads/{thread_id}` and `is_archived=false`.
      security:
        - bearerAuth: []
      parameters:
        - name: thread_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Archive result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationResult"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/projects:
    get:
      tags: [projects]
      summary: List projects
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      $ref: "#/components/schemas/Project"
                required: [projects]
        "401":
          $ref: "#/components/responses/UnauthorizedError"
    post:
      tags: [projects]
      summary: Create project
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "200":
          description: Created project
          content:
            application/json:
              schema:
                type: object
                properties:
                  project:
                    $ref: "#/components/schemas/Project"
                required: [project]
        "401":
          $ref: "#/components/responses/UnauthorizedError"
  /api/projects/{project_id}:
    get:
      tags: [projects]
      summary: Get project
      security:
        - bearerAuth: []
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  project:
                    $ref: "#/components/schemas/Project"
                required: [project]
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    patch:
      tags: [projects]
      summary: Update project
      description: >
        Replaces `files` and `links` when those fields are provided. If no
        fields are supplied, the project is returned unchanged and `updated_at`
        is not modified.
      security:
        - bearerAuth: []
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                type: object
                properties:
                  project:
                    $ref: "#/components/schemas/Project"
                required: [project]
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    delete:
      tags: [projects]
      summary: Delete project
      description: >
        Deletes the project and unlinks bound threads via the
        `threads.project_id` foreign key.
      security:
        - bearerAuth: []
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Delete result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationResult"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/notifications:
    get:
      tags: [notifications]
      summary: Long-poll proactive notifications
      security:
        - bearerAuth: []
      parameters:
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 60
            default: 30
      responses:
        "200":
          description: Notification batch (possibly empty)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationsResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
  /api/schedules:
    get:
      tags: [schedules]
      summary: List all schedules
      description: >
        Returns all one-shot and recurring schedules stored in the scheduler
        extension. Use the optional `status` query parameter to narrow the
        result set. Valid values differ by schedule type:
        one-shot — `scheduled`, `fired`, `cancelled`;
        recurring — `active`, `paused`, `cancelled`.
        When `status=active` is supplied, only recurring schedules with
        `status=active` **and** one-shot schedules with `status=scheduled` are
        returned (i.e. the filter is applied as "currently pending").
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          description: >
            Filter by schedule status. For one-shot schedules the applicable
            values are `scheduled`, `fired`, `cancelled`. For recurring
            schedules: `active`, `paused`, `cancelled`. The special alias
            `active` returns only pending/active schedules of both types.
          schema:
            type: string
            enum: [scheduled, fired, active, paused, cancelled]
      responses:
        "200":
          description: Schedule list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /api/schedules/once:
    post:
      tags: [schedules]
      summary: Create a one-shot schedule
      description: >
        Schedule a single event to fire once at a specific time.
        Provide **exactly one** of `delay_seconds` (relative) or `at_iso`
        (absolute ISO 8601 datetime). The event is published to the Event Bus
        under `topic` when it fires. Use system topics (`system.user.notify`,
        `system.agent.task`, `system.agent.background`) for built-in
        integrations; any other topic requires `payload_extra`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOnceScheduleRequest"
            examples:
              delay:
                summary: Fire in 5 minutes
                value:
                  topic: system.user.notify
                  message: "Reminder: stand-up in 5 minutes"
                  delay_seconds: 300
              absolute:
                summary: Fire at a specific time
                value:
                  topic: system.user.notify
                  message: "Good morning!"
                  at_iso: "2026-03-16T09:00:00"
                  channel_id: telegram_channel
      responses:
        "201":
          description: Schedule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleOnceResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /api/schedules/recurring:
    post:
      tags: [schedules]
      summary: Create a recurring schedule
      description: >
        Create a schedule that fires repeatedly according to a cron expression
        or a fixed interval. Provide **exactly one** of `cron` or
        `every_seconds`. Optionally set `until_iso` to limit the schedule
        duration. The schedule starts in `active` status immediately after
        creation.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRecurringScheduleRequest"
            examples:
              cron:
                summary: Daily at 09:00
                value:
                  topic: system.user.notify
                  message: "Daily stand-up time!"
                  cron: "0 9 * * *"
              interval:
                summary: Every 10 minutes until midnight
                value:
                  topic: system.agent.background
                  message: "Run health check"
                  every_seconds: 600
                  until_iso: "2026-03-16T00:00:00"
      responses:
        "201":
          description: Recurring schedule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleRecurringResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
  /api/schedules/{type}/{id}:
    delete:
      tags: [schedules]
      summary: Cancel a schedule
      description: >
        Cancel a schedule by its type and ID. For one-shot schedules only
        `scheduled` entries can be cancelled (already `fired` schedules are
        immutable). For recurring schedules, cancellation is always possible
        regardless of current status.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ScheduleType"
        - $ref: "#/components/parameters/ScheduleId"
      responses:
        "200":
          description: Schedule cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationResult"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          description: >
            Cannot cancel — the one-shot schedule has already been fired or
            was previously cancelled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
    patch:
      tags: [schedules]
      summary: Update or pause/resume a schedule
      description: >
        Update fields of a recurring schedule or change its status
        (`active` / `paused`). Applies **only to recurring schedules** — use
        `DELETE` to cancel a one-shot. Supplying `cron` or `every_seconds`
        also resets `next_fire_at` immediately. At most one of `cron` /
        `every_seconds` may be present per request.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ScheduleType"
        - $ref: "#/components/parameters/ScheduleId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateScheduleRequest"
            examples:
              pause:
                summary: Pause a recurring schedule
                value:
                  status: paused
              resume:
                summary: Resume a paused recurring schedule
                value:
                  status: active
              change_cron:
                summary: Change cron expression
                value:
                  cron: "0 10 * * 1-5"
              extend:
                summary: Extend end datetime
                value:
                  until_iso: "2026-12-31T23:59:59"
      responses:
        "200":
          description: Schedule updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateScheduleResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "422":
          description: >
            Semantic validation error — e.g. both `cron` and `every_seconds`
            supplied, or `until_iso` is in the past.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: APIKey
  parameters:
    XThreadId:
      name: X-Thread-Id
      in: header
      required: false
      description: Optional thread identifier for routing into an existing conversation thread.
      schema:
        type: string
    ScheduleType:
      name: type
      in: path
      required: true
      description: Schedule type — `one_shot` or `recurring`.
      schema:
        type: string
        enum: [one_shot, recurring]
    ScheduleId:
      name: id
      in: path
      required: true
      description: Numeric schedule ID as returned by the create endpoints.
      schema:
        type: integer
        minimum: 1
  responses:
    UnauthorizedError:
      description: Missing or invalid Bearer token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Invalid request payload
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BusyError:
      description: Another request is currently in progress
      headers:
        Retry-After:
          description: Recommended retry delay in seconds
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    TimeoutError:
      description: The request exceeded `request_timeout_seconds`
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServiceUnavailableError:
      description: Scheduler extension is not loaded or not initialized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    ModelsResponse:
      type: object
      properties:
        object:
          type: string
          const: list
        data:
          type: array
          items:
            $ref: "#/components/schemas/ModelObject"
      required: [object, data]
    ModelObject:
      type: object
      properties:
        id: { type: string }
        object: { type: string, const: model }
        created: { type: integer }
        owned_by: { type: string }
      required: [id, object, created, owned_by]
    ChatCompletionsRequest:
      type: object
      properties:
        model:
          type: string
          default: yodoca
        messages:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ChatMessage"
        stream:
          type: boolean
          default: false
        temperature:
          type: number
          minimum: 0
          maximum: 2
      required: [model, messages]
    ChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [system, user, assistant, tool]
        content:
          oneOf:
            - type: string
            - type: array
              items:
                type: object
                additionalProperties: true
      required: [role, content]
    ChatCompletionsResponse:
      type: object
      properties:
        id: { type: string }
        object: { type: string, const: chat.completion }
        created: { type: integer }
        model: { type: string }
        choices:
          type: array
          items:
            type: object
            additionalProperties: true
        usage:
          $ref: "#/components/schemas/UsageChat"
      required: [id, object, created, model, choices, usage]
    ResponsesRequest:
      type: object
      properties:
        model:
          type: string
          default: yodoca
        input:
          oneOf:
            - type: string
            - type: array
              items:
                type: object
                additionalProperties: true
          nullable: true
        messages:
          type: array
          nullable: true
          items:
            type: object
            additionalProperties: true
        stream:
          type: boolean
          default: false
      required: [model]
    ResponsesResponse:
      type: object
      properties:
        id: { type: string }
        object: { type: string, const: response }
        status: { type: string }
        output:
          type: array
          items:
            type: object
            additionalProperties: true
        model: { type: string }
        usage:
          $ref: "#/components/schemas/UsageResponses"
      required: [id, object, status, output, model, usage]
    UsageChat:
      type: object
      properties:
        prompt_tokens: { type: integer, minimum: 0 }
        completion_tokens: { type: integer, minimum: 0 }
        total_tokens: { type: integer, minimum: 0 }
      required: [prompt_tokens, completion_tokens, total_tokens]
    UsageResponses:
      type: object
      properties:
        input_tokens: { type: integer, minimum: 0 }
        output_tokens: { type: integer, minimum: 0 }
        total_tokens: { type: integer, minimum: 0 }
      required: [input_tokens, output_tokens, total_tokens]
    HealthResponse:
      type: object
      properties:
        status: { type: string, enum: [ok] }
        uptime_seconds: { type: integer, minimum: 0 }
      required: [status, uptime_seconds]
    Thread:
      type: object
      properties:
        id: { type: string }
        project_id: { type: string, nullable: true }
        title: { type: string, nullable: true }
        channel_id: { type: string }
        created_at: { type: integer }
        last_active_at: { type: integer }
        is_archived: { type: boolean }
      required: [id, channel_id, created_at, last_active_at, is_archived]
    ThreadDetailResponse:
      type: object
      properties:
        thread:
          $ref: "#/components/schemas/Thread"
        history:
          type: array
          items:
            type: object
            additionalProperties: true
      required: [thread, history]
    CreateThreadRequest:
      type: object
      properties:
        id: { type: string, nullable: true }
        project_id: { type: string, nullable: true }
        title: { type: string, nullable: true }
    UpdateThreadRequest:
      type: object
      properties:
        title: { type: string, nullable: true }
        project_id: { type: string, nullable: true }
        is_archived: { type: boolean, nullable: true }
    Project:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
        icon: { type: string, nullable: true }
        instructions: { type: string, nullable: true }
        agent_config:
          type: object
          additionalProperties: true
        created_at: { type: integer }
        updated_at: { type: integer }
        files:
          type: array
          items: { type: string }
        links:
          type: array
          items: { type: string }
      required: [id, name, agent_config, created_at, updated_at, files, links]
    CreateProjectRequest:
      type: object
      properties:
        name: { type: string }
        description: { type: string, nullable: true }
        icon: { type: string, nullable: true }
        instructions: { type: string, nullable: true }
        agent_config:
          type: object
          additionalProperties: true
          nullable: true
        files:
          type: array
          items: { type: string }
        links:
          type: array
          items: { type: string }
      required: [name]
    UpdateProjectRequest:
      type: object
      properties:
        name: { type: string, nullable: true }
        description: { type: string, nullable: true }
        icon: { type: string, nullable: true }
        instructions: { type: string, nullable: true }
        agent_config:
          type: object
          additionalProperties: true
          nullable: true
        files:
          type: array
          items: { type: string }
          nullable: true
        links:
          type: array
          items: { type: string }
          nullable: true
    Notification:
      type: object
      properties:
        id: { type: string }
        text: { type: string }
        created_at: { type: integer }
      required: [id, text, created_at]
    NotificationsResponse:
      type: object
      properties:
        notifications:
          type: array
          items:
            $ref: "#/components/schemas/Notification"
      required: [notifications]
    OperationResult:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string, nullable: true }
      required: [success]
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            message: { type: string }
            type: { type: string }
            code: { type: string, nullable: true }
          required: [message, type]
      required: [error]
    AgUIRunRequest:
      type: object
      description: AG-UI RunAgentInput request body (camelCase)
      properties:
        threadId:
          type: string
          description: Conversation thread identifier (maps to thread_id)
        runId:
          type: string
          description: Unique ID for this agent run
        parentRunId:
          type: string
          nullable: true
          description: Parent run ID for branching
        messages:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              role:
                type: string
                enum: [user, assistant, system, tool, activity, reasoning, developer]
              content:
                oneOf:
                  - type: string
                  - type: array
                    items:
                      type: object
                      properties:
                        type: { type: string }
                        text: { type: string }
            additionalProperties: true
          default: []
        tools:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              description: { type: string }
              parameters: {}
            additionalProperties: true
          default: []
        context:
          type: array
          items:
            type: object
            properties:
              description: { type: string }
              value: { type: string }
            additionalProperties: true
          default: []
        state: {}
        forwardedProps: {}
      required: [threadId, runId]
    ScheduleItem:
      type: object
      description: >
        A single schedule entry (one-shot or recurring). Fields `cron_expr`,
        `every_seconds`, and `until_iso` are only present for recurring entries.
        `fires_at_iso` is the next (or only) fire time in ISO 8601.
      properties:
        id: { type: integer }
        type:
          type: string
          enum: [one_shot, recurring]
        topic: { type: string }
        message: { type: string, nullable: true }
        channel_id: { type: string, nullable: true }
        payload:
          type: object
          additionalProperties: true
          description: Raw Event Bus payload that will be emitted when the schedule fires.
        fires_at_iso:
          type: string
          format: date-time
          description: Next (or only) scheduled fire time in ISO 8601.
        status:
          type: string
          description: >
            One-shot statuses: `scheduled`, `fired`, `cancelled`.
            Recurring statuses: `active`, `paused`, `cancelled`.
        cron_expr:
          type: string
          nullable: true
          description: Cron expression — present only for recurring schedules.
        every_seconds:
          type: number
          nullable: true
          description: Fixed interval in seconds — present only for recurring schedules.
        until_iso:
          type: string
          format: date-time
          nullable: true
          description: Optional expiry datetime — present only for recurring schedules.
        created_at: { type: integer, description: Unix timestamp of creation. }
      required: [id, type, topic, payload, fires_at_iso, status, created_at]
    ScheduleListResponse:
      type: object
      properties:
        schedules:
          type: array
          items:
            $ref: "#/components/schemas/ScheduleItem"
        count: { type: integer, minimum: 0 }
      required: [schedules, count]
    CreateOnceScheduleRequest:
      type: object
      description: >
        Payload for creating a one-shot schedule. Exactly one of `delay_seconds`
        or `at_iso` must be supplied.
      properties:
        topic:
          type: string
          description: >
            Event Bus topic to emit when the schedule fires.
            Built-in system topics: `system.user.notify` (delivers `message` as
            text to the user), `system.agent.task` (sends `message` as a prompt
            to the agent), `system.agent.background` (agent task without a
            user-facing response). Any custom topic requires `payload_extra`.
          examples:
            - system.user.notify
            - system.agent.task
            - system.agent.background
        message:
          type: string
          description: >
            Human-readable text (for `system.user.notify`) or instruction prompt
            (for `system.agent.task` / `system.agent.background`). For custom
            topics this becomes the `message` field of `payload_extra` unless
            overridden there.
        channel_id:
          type: string
          nullable: true
          description: >
            Optional delivery channel ID (e.g. `telegram_channel`).
            If omitted, the default channel is used.
        payload_extra:
          type: object
          additionalProperties: true
          nullable: true
          description: >
            Additional key/value fields merged into the Event Bus payload.
            Intended for custom (non-system) topics only.
        delay_seconds:
          type: integer
          minimum: 1
          nullable: true
          description: >
            Number of seconds from now until the schedule fires.
            Mutually exclusive with `at_iso`.
        at_iso:
          type: string
          format: date-time
          nullable: true
          description: >
            Absolute fire time as ISO 8601 datetime (e.g. `2026-03-16T09:00:00`).
            Must be in the future. Mutually exclusive with `delay_seconds`.
      required: [topic, message]
    ScheduleOnceResponse:
      type: object
      properties:
        success: { type: boolean }
        schedule_id: { type: integer }
        topic: { type: string }
        fires_in_seconds: { type: integer, minimum: 0 }
        status: { type: string, enum: [scheduled] }
        error: { type: string, nullable: true }
      required: [success, schedule_id, topic, fires_in_seconds, status]
    CreateRecurringScheduleRequest:
      type: object
      description: >
        Payload for creating a recurring schedule. Exactly one of `cron` or
        `every_seconds` must be supplied.
      properties:
        topic:
          type: string
          description: >
            Event Bus topic to emit on each fire. Same semantics as for
            `CreateOnceScheduleRequest.topic`.
          examples:
            - system.user.notify
            - system.agent.background
        message:
          type: string
          description: >
            Text or prompt delivered with each event. Same semantics as for
            `CreateOnceScheduleRequest.message`.
        channel_id:
          type: string
          nullable: true
          description: Optional delivery channel ID.
        payload_extra:
          type: object
          additionalProperties: true
          nullable: true
          description: >
            Additional key/value fields merged into the Event Bus payload for
            custom topics.
        cron:
          type: string
          nullable: true
          description: >
            Standard 5-field cron expression (e.g. `0 9 * * *` for daily at
            09:00, `*/15 * * * *` for every 15 minutes).
            Mutually exclusive with `every_seconds`.
        every_seconds:
          type: number
          minimum: 1
          nullable: true
          description: >
            Fixed repeat interval in seconds (positive number).
            Mutually exclusive with `cron`.
        until_iso:
          type: string
          format: date-time
          nullable: true
          description: >
            Optional ISO 8601 datetime after which the schedule is
            auto-cancelled. Must be in the future.
      required: [topic, message]
    ScheduleRecurringResponse:
      type: object
      properties:
        success: { type: boolean }
        schedule_id: { type: integer }
        next_fire_iso:
          type: string
          format: date-time
        status: { type: string, enum: [created] }
        error: { type: string, nullable: true }
      required: [success, schedule_id, next_fire_iso, status]
    UpdateScheduleRequest:
      type: object
      description: >
        Partial update for a **recurring** schedule. All fields are optional;
        supply only those you want to change. At most one of `cron` /
        `every_seconds` may be present. Changing `cron` or `every_seconds`
        immediately recalculates `next_fire_at`.
      properties:
        cron:
          type: string
          nullable: true
          description: >
            New cron expression. Clears any existing `every_seconds` on the
            schedule. Mutually exclusive with `every_seconds` in this request.
        every_seconds:
          type: number
          minimum: 1
          nullable: true
          description: >
            New fixed interval in seconds. Clears any existing `cron` on the
            schedule. Mutually exclusive with `cron` in this request.
        until_iso:
          type: string
          format: date-time
          nullable: true
          description: >
            New or updated end datetime in ISO 8601. Pass `null` explicitly to
            remove an existing expiry and make the schedule open-ended.
        status:
          type: string
          enum: [active, paused]
          nullable: true
          description: >
            Set to `paused` to suspend firing without cancelling; set back to
            `active` to resume. Use `DELETE` to permanently cancel.
    UpdateScheduleResponse:
      type: object
      properties:
        success: { type: boolean }
        schedule_id: { type: integer }
        next_fire_iso:
          type: string
          format: date-time
          description: Next scheduled fire time after the update.
        message: { type: string, nullable: true }
        error: { type: string, nullable: true }
      required: [success, schedule_id, next_fire_iso]

