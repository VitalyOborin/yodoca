# Project domain paths: /api/projects, /api/projects/{project_id}

/api/projects:
  get:
    tags: [projects]
    summary: List projects
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Project list
        content:
          application/json:
            schema:
              type: object
              properties:
                projects:
                  type: array
                  items:
                    $ref: "#/components/schemas/Project"
              required: [projects]
      "401":
        $ref: "#/components/responses/UnauthorizedError"
  post:
    tags: [projects]
    summary: Create project
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CreateProjectRequest"
    responses:
      "200":
        description: Created project
        content:
          application/json:
            schema:
              type: object
              properties:
                project:
                  $ref: "#/components/schemas/Project"
              required: [project]
      "401":
        $ref: "#/components/responses/UnauthorizedError"
/api/projects/{project_id}:
  get:
    tags: [projects]
    summary: Get project
    security:
      - bearerAuth: []
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
    responses:
      "200":
        description: Project detail
        content:
          application/json:
            schema:
              type: object
              properties:
                project:
                  $ref: "#/components/schemas/Project"
              required: [project]
      "401":
        $ref: "#/components/responses/UnauthorizedError"
      "404":
        $ref: "#/components/responses/NotFoundError"
  patch:
    tags: [projects]
    summary: Update project
    description: >
      Replaces `files` and `links` when those fields are provided. If no
      fields are supplied, the project is returned unchanged and `updated_at`
      is not modified.
    security:
      - bearerAuth: []
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UpdateProjectRequest"
    responses:
      "200":
        description: Updated project
        content:
          application/json:
            schema:
              type: object
              properties:
                project:
                  $ref: "#/components/schemas/Project"
              required: [project]
      "401":
        $ref: "#/components/responses/UnauthorizedError"
      "404":
        $ref: "#/components/responses/NotFoundError"
  delete:
    tags: [projects]
    summary: Delete project
    description: >
      Deletes the project and unlinks bound threads via the
      `threads.project_id` foreign key.
    security:
      - bearerAuth: []
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
    responses:
      "200":
        description: Delete result
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OperationResult"
      "401":
        $ref: "#/components/responses/UnauthorizedError"
      "404":
        $ref: "#/components/responses/NotFoundError"
