# AG-UI protocol schemas.
# Referenced from the main OpenAPI document.

AgUIRunRequest:
  type: object
  description: AG-UI RunAgentInput request body (camelCase)
  properties:
    threadId:
      type: string
      description: Conversation thread identifier (maps to thread_id)
    runId:
      type: string
      description: Unique ID for this agent run
    parentRunId:
      type: string
      nullable: true
      description: Parent run ID for branching
    messages:
      type: array
      items:
        type: object
        properties:
          id: { type: string }
          role:
            type: string
            enum: [user, assistant, system, tool, activity, reasoning, developer]
          content:
            oneOf:
              - type: string
              - type: array
                items:
                  type: object
                  properties:
                    type: { type: string }
                    text: { type: string }
        additionalProperties: true
      default: []
    tools:
      type: array
      items:
        type: object
        properties:
          name: { type: string }
          description: { type: string }
          parameters: {}
        additionalProperties: true
      default: []
    context:
      type: array
      items:
        type: object
        properties:
          description: { type: string }
          value: { type: string }
        additionalProperties: true
      default: []
    state: {}
    forwardedProps: {}
  required: [threadId, runId]
