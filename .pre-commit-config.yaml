# Install: uv sync --extra dev && uv run pre-commit install
repos:
  - repo: local
    hooks:
      - id: extension-boundaries
        name: Extension boundary check
        entry: uv run python scripts/check_extension_boundaries.py
        language: system
        pass_filenames: false
        files: ^sandbox/extensions/

      - id: extension-context-boundary
        name: Extension context boundary check
        entry: uv run python scripts/check_extension_context_boundary.py
        language: system
        pass_filenames: false
        files: ^sandbox/extensions/

      - id: max-loc
        name: Max LOC check
        entry: uv run python scripts/check_max_loc.py --allowlist scripts/max_loc_allowlist.txt
        language: system
        pass_filenames: false
        files: \.py$
